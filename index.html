<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kamikobo — curated Japanese stationery and cute finds. Launching soon in Australia.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#F5EDE6">
  <link rel="icon" href="favicon.png" type="image/png">
  <title>Kamikobo — Coming Soon</title>

  <style>
    :root {
      --mocha: #4A3428;
      --sage: #A8B8A1;
      --pink: #D99A95;
      --cream: #F5EDE6;
      --cream-light: #FBF7F2;
      --line: rgba(74, 52, 40, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
      color: var(--mocha);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
                   BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(217, 154, 149, 0.22), transparent 25%),
        radial-gradient(circle at 88% 82%, rgba(168, 184, 161, 0.26), transparent 28%),
        repeating-linear-gradient(
          0deg,
          rgba(74, 52, 40, 0.018) 0,
          rgba(74, 52, 40, 0.018) 1px,
          transparent 1px,
          transparent 5px
        ),
        var(--cream);
    }

    .shell {
      width: min(880px, 100%);
      padding: clamp(26px, 5vw, 48px);
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(251, 247, 242, 0.88);
      box-shadow:
        0 26px 80px rgba(74, 52, 40, 0.11),
        inset 0 0 0 1px rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(5px);
      position: relative;
      overflow: hidden;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .shell::before {
      width: 170px;
      height: 170px;
      top: -85px;
      right: -50px;
      background: rgba(217, 154, 149, 0.16);
    }

    .shell::after {
      width: 190px;
      height: 190px;
      bottom: -110px;
      left: -70px;
      background: rgba(168, 184, 161, 0.20);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo {
      display: block;
      width: min(520px, 92%);
      height: auto;
      margin: 0 auto;
      border-radius: 18px;
      mix-blend-mode: multiply;
    }

    .divider {
      width: 74px;
      height: 3px;
      margin: 18px auto 24px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--sage) 0 48%,
        var(--pink) 48% 100%
      );
    }

    h1 {
      margin: 0;
      color: var(--mocha);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(29px, 5vw, 46px);
      font-weight: 500;
      letter-spacing: -0.025em;
    }

    .message {
      max-width: 590px;
      margin: 15px auto 0;
      color: rgba(74, 52, 40, 0.76);
      font-size: clamp(16px, 2.6vw, 20px);
      line-height: 1.65;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 11px 17px;
      border: 1px solid rgba(74, 52, 40, 0.14);
      border-radius: 999px;
      color: var(--mocha);
      background: rgba(168, 184, 161, 0.24);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 0 5px rgba(217, 154, 149, 0.18);
    }

    footer {
      margin-top: 25px;
      color: rgba(74, 52, 40, 0.64);
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    @media (max-width: 520px) {
      .shell {
        padding: 24px 16px 30px;
        border-radius: 22px;
      }

      .logo {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <div class="content">
      <img
        class="logo"
        src="kamikobo-logo.webp"
        alt="Kamikobo — curated Japanese stationery and cute finds"
      >

      <div class="divider" aria-hidden="true"></div>

      <h1>A little paper joy is on its way.</h1>

      <p class="message">
        We are preparing a thoughtful collection of cute, functional Japanese
        stationery and gifts for Australia.
      </p>

      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        Online store coming soon
      </div>

      <footer>kamikobo.com.au</footer>
    </div>
  </main>
</body>
</html>
